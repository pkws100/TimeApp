name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware-checks:
    name: Firmware builds and native tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned PlatformIO Core
        run: python -m pip install --disable-pip-version-check platformio==6.1.19

      - name: Build firmware 1.0 and 1.1 test image
        run: PIO_CMD=pio sh terminal/firmware/pkws-time-terminal/build-test.sh

  php-and-node-checks:
    name: PHP, PHPUnit and Node checks
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: ci-test-root-password
          MARIADB_DATABASE: timeapp_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, gd, mbstring, pdo_mysql, zip
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHP syntax check
        run: |
          find . \
            -path ./vendor -prune -o \
            -path ./node_modules -prune -o \
            -path ./storage -prune -o \
            -name '*.php' -print0 \
            | xargs -0 -n 1 php -l

      - name: Run PHPUnit
        env:
          APP_ENV: testing
          APP_DEBUG: 'true'
          APP_SECRET: ci-test-secret
          SETTINGS_ENCRYPTION_KEY: ci-test-settings-key
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_DATABASE: timeapp_ci
          DB_USERNAME: root
          DB_PASSWORD: ci-test-root-password
          DB_SOCKET: ''
          DB_OVERRIDE_FILE: /tmp/timeapp-ci-database.override.php
          TIMEAPP_TEST_DB_HOST: 127.0.0.1
          TIMEAPP_TEST_DB_PORT: '3306'
          TIMEAPP_TEST_DB_USERNAME: root
          TIMEAPP_TEST_DB_PASSWORD: ci-test-root-password
        run: COMPOSER_ALLOW_SUPERUSER=1 composer test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: JavaScript syntax check
        run: |
          node --check public/assets/js/app.js
          node --check tests/e2e/app.spec.js

  docker-production-smoke:
    name: Production Docker image smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build --pull -t timeapp-ci:${{ github.sha }} .

      - name: Calendar policy smoke inside production image
        run: |
          docker run --rm -i timeapp-ci:${{ github.sha }} php <<'PHP'
          <?php

          declare(strict_types=1);

          require 'bootstrap/autoload.php';

          $service = new App\Domain\Calendar\CalendarPolicyService(
              new App\Infrastructure\Database\DatabaseConnection([])
          );

          $holidays = $service->publicHolidays(2026, 'NW');
          $expected = [
              '2026-04-03' => 'Karfreitag',
              '2026-04-06' => 'Ostermontag',
              '2026-05-14' => 'Christi Himmelfahrt',
              '2026-05-25' => 'Pfingstmontag',
              '2026-06-04' => 'Fronleichnam',
          ];

          foreach ($expected as $date => $name) {
              if (($holidays[$date]['name'] ?? null) !== $name) {
                  fwrite(STDERR, sprintf("Calendar smoke failed for %s\n", $date));
                  exit(1);
              }
          }

          echo "Calendar smoke passed\n";
          PHP
